apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: eks-part1
  region: eu-central-1

managedNodeGroups:
  - name: minimal-workers
    instanceType: t3.medium
    minSize: 1
    maxSize: 1
    desiredCapacity: 1
    volumeSize: 20
    labels:
      role: worker
    tags:
      environment: part1