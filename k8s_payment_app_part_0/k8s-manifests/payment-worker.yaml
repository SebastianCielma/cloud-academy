apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-worker
  template:
    metadata:
      labels:
        app: payment-worker
    spec:
      containers:
      - name: worker
        # UWAGA: Podmień <TWÓJ_ACCOUNT_ID>!
        image: 834948575491.dkr.ecr.eu-central-1.amazonaws.com/finpay/payment-worker:1.0.0
        ports:
        - containerPort: 8090
        env:
        - name: APP_ENV
          valueFrom: { configMapKeyRef: { name: app-config, key: APP_ENV } }
        - name: LOG_LEVEL
          valueFrom: { configMapKeyRef: { name: app-config, key: LOG_LEVEL } }
        - name: SPRING_DATASOURCE_URL
          valueFrom: { configMapKeyRef: { name: app-config, key: DB_URL } }
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom: { configMapKeyRef: { name: app-config, key: DB_USER } }
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom: { secretKeyRef: { name: db-credentials, key: password } }
        # Wymóg dla Workera: Actuator endpoints
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8090
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8090
          initialDelaySeconds: 20
          periodSeconds: 10